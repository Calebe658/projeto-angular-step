<div id="mainDiv">
    <mat-card *ngFor="let produto of produtos" class="example-card" appearance="outlined">

        <mat-card-header>
            <mat-card-title>{{produto.title}}</mat-card-title>
            <mat-card-subtitle>{{produto.category}}</mat-card-subtitle>
        </mat-card-header>

        <img mat-card-image [src]="produto.image" alt="Foto do produto" id="imgProduto">

        <mat-card-content>
            <p>
                {{produto.description}}
            </p>
        </mat-card-content>

        <mat-card-actions>
            <button matButton>LIKE</button>
            <button matButton>SHARE</button>
        </mat-card-actions>
    </mat-card>
</div>
