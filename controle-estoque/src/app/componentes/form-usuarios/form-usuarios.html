<form [formGroup]="registroForm" (ngSubmit)="registrar()">
    <input type="email" formControlName="email" placeholder="E-mail" />
    <input type="password" formControlName="password" placeholder="Senha" />
    <input type="text" formControlName="name" placeholder="Primeiro nome" />

    <select formControlName="cargo">
        <option value="">Selecione a função</option>
        <option value="operacional">Operacional</option>
        <option value="admin">Administrador</option>
        <option value="gerente">Gerente operacional</option>
    </select>

    <button type="submit">Entrar</button>
</form>

<p *ngIf="registroForm.get('email')?.invalid">
    E-mail inválido
</p>
